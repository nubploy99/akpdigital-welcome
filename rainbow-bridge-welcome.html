<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>จดหมายจากสะพานสายรุ้ง — AKP Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Nunito:wght@300;400;500&family=Sarabun:ital,wght@0,200;0,300;1,200;1,300&family=Mitr:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #f5ede0;
      --gold: #c9a96e;
      --deep: #2c1a0e;
      --amber: #e8c99a;
      --muted: rgba(245, 237, 224, 0.65);
      --warm-shadow: rgba(44, 26, 14, 0.6);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--deep);
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed; width: 6px; height: 6px;
      background: var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s;
      mix-blend-mode: screen;
    }
    .cursor-ring {
      position: fixed; width: 32px; height: 32px;
      border: 1px solid rgba(201,169,110,0.4); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%);
    }

    /* Background image */
    .bg-image {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('1000014923.png');
      background-size: cover;
      background-position: center;
      transform: scale(1.05);
      animation: subtle-drift 20s ease-in-out infinite alternate;
    }

    @keyframes subtle-drift {
      from { transform: scale(1.05) translate(0, 0); }
      to   { transform: scale(1.05) translate(-1%, -0.5%); }
    }

    /* Overlays */
    .overlay-vignette {
      position: fixed; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse at center, transparent 25%, rgba(20,10,5,0.65) 100%),
        linear-gradient(to bottom, rgba(20,10,5,0.3) 0%, transparent 35%, transparent 55%, rgba(20,10,5,0.7) 100%);
    }
    .overlay-warm {
      position: fixed; inset: 0; z-index: 2;
      background: rgba(160, 80, 20, 0.12);
      mix-blend-mode: multiply;
    }
    .grain {
      position: fixed; inset: -50%; z-index: 3;
      width: 200%; height: 200%; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
      animation: grain-shift 10s steps(8) infinite;
    }
    @keyframes grain-shift {
      0%,100%{transform:translate(0,0)} 12%{transform:translate(-2%,-3%)} 25%{transform:translate(3%,1%)}
      37%{transform:translate(-1%,4%)} 50%{transform:translate(2%,-2%)} 62%{transform:translate(-3%,2%)}
      75%{transform:translate(1%,-3%)} 87%{transform:translate(-2%,1%)}
    }

    /* Rainbow shimmer */
    .rainbow-shimmer {
      position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 4;
      background: linear-gradient(90deg, transparent, rgba(255,200,100,0.6), rgba(255,150,150,0.4), rgba(200,200,255,0.4), rgba(150,255,200,0.4), transparent);
      opacity: 0;
      animation: rainbow-reveal 3s ease forwards 1s;
    }
    @keyframes rainbow-reveal {
      from { opacity: 0; } to { opacity: 1; }
    }

    /* Main content */
    .content {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px;
      opacity: 0;
      animation: content-in 2.5s ease forwards 0.6s;
    }
    @keyframes content-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .deco-top {
      width: 1px; height: 50px;
      background: linear-gradient(to bottom, transparent, var(--gold));
      opacity: 0.6; margin-bottom: 28px;
      animation: line-grow 1.5s ease forwards 1.2s;
      transform-origin: top; transform: scaleY(0); opacity: 0;
    }
    @keyframes line-grow {
      from { transform: scaleY(0); opacity: 0; }
      to   { transform: scaleY(1); opacity: 0.6; }
    }

    .eyebrow {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100; font-size: clamp(9px, 1.1vw, 11px);
      letter-spacing: 0.4em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 16px;
      opacity: 0; animation: fade-up 1.5s ease forwards 1.4s;
    }

    .book-title-th {
      font-family: 'Sarabun', sans-serif;
      font-weight: 200; font-style: italic;
      font-size: clamp(28px, 5vw, 52px);
      color: var(--cream); text-align: center;
      line-height: 1.3; letter-spacing: 0.02em;
      opacity: 0; animation: fade-up 1.8s ease forwards 1.6s;
      text-shadow: 0 2px 30px rgba(20,10,5,0.8);
    }

    .book-title-en {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-style: italic;
      font-size: clamp(13px, 1.8vw, 17px);
      color: var(--amber); margin-top: 8px;
      letter-spacing: 0.08em; text-align: center;
      opacity: 0; animation: fade-up 1.5s ease forwards 1.8s;
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 28px 0;
      opacity: 0; animation: fade-up 1.5s ease forwards 2s;
    }
    .divider-line {
      width: 50px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .divider-line.right {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .divider-diamond {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg); opacity: 0.7;
    }

    /* 3 Buttons */
    .buttons-wrapper {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      opacity: 0; animation: fade-up 1.5s ease forwards 2.2s;
    }

    .btn {
      font-family: 'Mitr', sans-serif;
      font-weight: 300; font-size: clamp(13px, 1.6vw, 16px);
      letter-spacing: 0.05em; text-transform: none;
      color: var(--cream); background: transparent;
      border: none; cursor: none; padding: 13px 32px;
      position: relative; transition: color 0.4s ease;
      white-space: nowrap;
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      border: 1px solid rgba(201,169,110,0.5);
      transition: opacity 0.4s, transform 0.4s;
    }
    .btn::after {
      content: ''; position: absolute; inset: 0;
      border: 1px solid rgba(201,169,110,0.15);
      transform: scale(0.9, 0.8);
      transition: opacity 0.4s, transform 0.4s;
    }
    .btn:hover { color: var(--amber); }
    .btn:hover::before { opacity: 1; border-color: rgba(201,169,110,0.9); }
    .btn:hover::after { transform: scale(1.05, 1.15); opacity: 0.5; }

    .btn-primary {
      font-size: clamp(10px, 1.4vw, 13px);
      padding: 15px 40px;
    }
    .btn-primary::before { border-color: rgba(201,169,110,0.7); }

    .btn-secondary { opacity: 0.8; }

    /* Bottom */
    .bottom-bar {
      position: fixed; bottom: 28px; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      gap: 20px;
      opacity: 0; animation: fade-up 1.5s ease forwards 2.6s;
    }

    .brand-text {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100; font-size: 9px;
      letter-spacing: 0.3em; color: rgba(245,237,224,0.25);
      text-transform: uppercase;
    }

    /* Sound toggle */
    .sound-toggle {
      position: fixed; bottom: 28px; right: 32px; z-index: 10;
      display: flex; align-items: center; gap: 8px;
      cursor: none;
      opacity: 0; animation: fade-up 1.5s ease forwards 2.8s;
    }
    .sound-label {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100; font-size: 9px;
      letter-spacing: 0.3em; color: rgba(245,237,224,0.3);
      text-transform: uppercase; transition: color 0.3s;
    }
    .sound-toggle:hover .sound-label { color: var(--gold); }
    .sound-bars { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
    .sbar {
      width: 2px; background: rgba(201,169,110,0.4); border-radius: 1px;
      transition: background 0.3s;
      animation: swave 1.2s ease-in-out infinite;
    }
    .sbar:nth-child(1){height:40%;animation-delay:0s}
    .sbar:nth-child(2){height:100%;animation-delay:0.2s}
    .sbar:nth-child(3){height:60%;animation-delay:0.4s}
    .sbar:nth-child(4){height:80%;animation-delay:0.1s}
    @keyframes swave {
      0%,100%{transform:scaleY(1)} 50%{transform:scaleY(0.3)}
    }
    .sbar.muted { animation: none; height: 2px !important; }
    .sound-toggle:hover .sbar { background: var(--gold); }

    /* Transition */
    .fade-out {
      position: fixed; inset: 0; z-index: 100;
      background: var(--deep); opacity: 0;
      pointer-events: none; transition: opacity 1.2s ease;
    }
    .fade-out.active { opacity: 1; pointer-events: all; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Background -->
  <div class="bg-image"></div>
  <div class="overlay-vignette"></div>
  <div class="overlay-warm"></div>
  <div class="grain"></div>
  <div class="rainbow-shimmer"></div>

  <!-- Audio: เสียงป่า (เบา) + เสียงน้ำ (ดัง) -->
  <audio id="audio-forest" loop>
    <source src="audiopapkin-forest-ambience-296528.mp3" type="audio/mpeg"/>
  </audio>
  <audio id="audio-river" loop>
    <source src="dragon-studio-soothing-river-flow-372456.mp3" type="audio/mpeg"/>
  </audio>

  <!-- Main content -->
  <div class="content">
    <div class="deco-top"></div>
    <p class="eyebrow">AKP Digital presents</p>
    <h1 class="book-title-th">จดหมายจากสะพานสายรุ้ง</h1>
    <p class="book-title-en">Letters from the Rainbow Bridge</p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line right"></div>
    </div>

    <div class="buttons-wrapper">
      <!-- ปุ่ม 1: หน้าสินค้าเล่มนี้ -->
      <button class="btn btn-primary" onclick="goTo('LINK_PRODUCT_HERE')">
        ✉️ เปิดซองจดหมาย
      </button>
      <!-- ปุ่ม 2: สินค้าทั้งหมด -->
      <button class="btn btn-secondary" onclick="goTo('LINK_ALL_PRODUCTS_HERE')">
        📚 ห้องสมุดแห่งความรู้สึก
      </button>
      <!-- ปุ่ม 3: หน้าเว็บหลัก -->
      <button class="btn btn-secondary" onclick="goTo('https://akpdigital.carrd.co')">
        🌿 กลับสู่ AKP Digital
      </button>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-bar">
    <span class="brand-text">akpdigital.com &nbsp;·&nbsp; จดหมายจากสะพานสายรุ้ง</span>
  </div>

  <div class="sound-toggle" id="soundToggle" onclick="toggleSound()">
    <div class="sound-bars" id="soundBars">
      <div class="sbar"></div>
      <div class="sbar"></div>
      <div class="sbar"></div>
      <div class="sbar"></div>
    </div>
    <span class="sound-label" id="soundLabel">Sound On</span>
  </div>

  <div class="fade-out" id="fadeOut"></div>

  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx+'px'; cursor.style.top = my+'px'; });
    (function animRing() { rx += (mx-rx)*0.12; ry += (my-ry)*0.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing); })();

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('mouseenter', () => { cursor.style.width='12px'; cursor.style.height='12px'; });
      btn.addEventListener('mouseleave', () => { cursor.style.width='6px'; cursor.style.height='6px'; });
    });

    // Audio — เสียงนกเบากว่า (volume 0.25) เสียงน้ำดัง (volume 0.6)
    const forest = document.getElementById('audio-forest');
    const river = document.getElementById('audio-river');
    forest.volume = 0.25;
    river.volume = 0.6;
    let isMuted = true;

    function toggleSound() {
      isMuted = !isMuted;
      if (!isMuted) {
        forest.play().catch(()=>{});
        river.play().catch(()=>{});
      } else {
        forest.pause();
        river.pause();
      }
      document.querySelectorAll('.sbar').forEach(b => b.classList.toggle('muted', isMuted));
      document.getElementById('soundLabel').textContent = isMuted ? 'Sound Off' : 'Sound On';
    }

    // Navigate
    function goTo(url) {
      if (!url || url.includes('LINK_')) {
        alert('กรุณาใส่ลิงก์ก่อนนะคะ 😊');
        return;
      }
      const fade = document.getElementById('fadeOut');
      fade.classList.add('active');
      setTimeout(() => { window.location.href = url; }, 1200);
    }
  </script>

</body>
</html>
