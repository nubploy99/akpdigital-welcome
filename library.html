<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Library of Feelings — AKP Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Josefin+Sans:wght@100;200;300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #e8ddd0;
      --title: #6b4a32;        /* สีน้ำตาลอุ่น แบบ Reference */
      --heading: #3a2510;      /* น้ำตาลเข้ม อ่านชัด */
      --body: #4a3020;         /* body text */
      --label: #5a3e28;        /* label เล็กๆ ชัดขึ้น */
      --gold: #7a4e18;         /* gold accent */
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      font-family: 'Josefin Sans', sans-serif;
      overflow-x: hidden; min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 10% 10%, rgba(255,240,215,0.55) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(200,170,135,0.3) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── HERO ── */
    .hero {
      position: relative; z-index: 10;
      text-align: center; padding: 90px 24px 52px;
    }
    .hero-eyebrow {
      font-weight: 300; font-size: 11px; letter-spacing: 0.5em;
      color: var(--label); text-transform: uppercase; margin-bottom: 22px;
      opacity: 0; animation: fade-up 1.2s ease forwards 0.3s;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(44px, 8vw, 72px);
      color: var(--title);   /* ← สีน้ำตาลอุ่นแบบ Reference */
      line-height: 1.05; letter-spacing: -0.01em;
      opacity: 0; animation: fade-up 1.2s ease forwards 0.5s;
    }
    .hero-title em { font-style: italic; color: var(--title); opacity: 0.8; }
    .hero-sub {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 18px; color: var(--body); margin-top: 14px; letter-spacing: 0.04em;
      opacity: 0; animation: fade-up 1.2s ease forwards 0.7s;
    }
    .hero-divider {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-top: 32px;
      opacity: 0; animation: fade-up 1.2s ease forwards 0.9s;
    }
    .hdl { width: 50px; height: 1px; background: linear-gradient(to right, transparent, var(--gold)); opacity: 0.6; }
    .hdl.r { background: linear-gradient(to left, transparent, var(--gold)); }
    .hdd { width: 4px; height: 4px; background: var(--gold); transform: rotate(45deg); opacity: 0.7; }

    /* ── SECTION LABEL ── */
    .section-label {
      position: relative; z-index: 10;
      text-align: center; padding: 0 24px 28px;
      opacity: 0; animation: fade-up 1.2s ease forwards 1s;
    }
    .section-label p {
      font-weight: 300; font-size: 11px; letter-spacing: 0.5em;
      text-transform: uppercase; color: var(--label);
    }

    /* ── FEATURED GRID ── */
    .featured-grid {
      position: relative; z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px; padding: 0 28px 72px;
      max-width: 960px; margin: 0 auto;
    }

    .featured-card {
      position: relative; border-radius: 3px; overflow: hidden;
      cursor: pointer;
      opacity: 0; animation: fade-up 1s ease forwards;
      transition: transform 0.5s ease, box-shadow 0.5s ease;
      box-shadow: 0 8px 32px rgba(60,35,10,0.18);
      background: var(--bg);
    }
    .featured-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(60,35,10,0.25);
    }
    .featured-img {
      width: 100%; height: 340px; object-fit: cover; display: block;
      transition: transform 0.6s ease;
    }
    .featured-card:hover .featured-img { transform: scale(1.04); }

    .featured-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(25,14,5,0.88) 0%, rgba(25,14,5,0.15) 55%, transparent 100%);
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 28px 24px;
    }
    .featured-tag {
      font-weight: 300; font-size: 10px; letter-spacing: 0.4em;
      text-transform: uppercase; color: rgba(235,205,165,1);
      margin-bottom: 8px;
    }
    .featured-title {
      font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic;
      font-size: clamp(22px, 3vw, 28px);
      color: rgba(255,248,238,1); line-height: 1.2; margin-bottom: 16px;
    }
    .featured-btn {
      font-weight: 300; font-size: 10px; letter-spacing: 0.35em;
      text-transform: uppercase; color: rgba(245,228,200,1);
      border-bottom: 1px solid rgba(215,180,120,0.8);
      padding-bottom: 3px; display: inline-block;
      transition: color 0.3s;
    }
    .featured-card:hover .featured-btn { color: #fff; border-color: rgba(255,255,255,0.6); }

    /* ── MID DIVIDER ── */
    .mid-divider {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 20px;
      padding: 0 32px 44px; max-width: 960px; margin: 0 auto;
      opacity: 0; animation: fade-up 1s ease forwards 1.2s;
    }
    .mid-line { flex: 1; height: 1px; background: rgba(90,62,40,0.25); }
    .mid-text {
      font-weight: 300; font-size: 10px; letter-spacing: 0.5em;
      text-transform: uppercase; color: var(--label); white-space: nowrap;
    }

    /* ── EXPERIENCE GRID ── */
    .experience-grid {
      position: relative; z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 14px; padding: 0 28px 100px;
      max-width: 960px; margin: 0 auto;
    }
    .exp-card {
      border: 1px solid rgba(90,62,40,0.35);
      padding: 26px 14px 22px; text-align: center; cursor: pointer;
      transition: all 0.4s ease;
      opacity: 0; animation: fade-up 0.9s ease forwards;
    }
    .exp-card:hover {
      border-color: rgba(90,62,40,0.7);
      background: rgba(90,62,40,0.07);
      box-shadow: 0 8px 32px rgba(60,35,10,0.1);
      transform: translateY(-4px);
    }
    .exp-icon { font-size: 26px; margin-bottom: 10px; display: block; }
    .exp-title {
      font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 16px;
      color: var(--heading); margin-bottom: 6px;
    }
    .exp-sub {
      font-weight: 300; font-size: 9px; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--body);
    }

    /* ── FOOTER ── */
    .footer-nav {
      position: relative; z-index: 10; text-align: center;
      padding: 0 24px 70px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .footer-line { width: 40px; height: 1px; background: rgba(90,62,40,0.35); margin-bottom: 6px; }
    .footer-btn {
      font-weight: 300; font-size: 10px; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--label);
      background: transparent; border: none; cursor: pointer;
      transition: color 0.3s; text-decoration: none;
    }
    .footer-btn:hover { color: var(--heading); }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="hero">
    <p class="hero-eyebrow">AKP Digital &nbsp;·&nbsp; Collection</p>
    <h1 class="hero-title">The Library of<br><em>Feelings</em></h1>
    <p class="hero-sub">A quiet emotional cinematic library</p>
    <div class="hero-divider">
      <div class="hdl"></div><div class="hdd"></div><div class="hdl r"></div>
    </div>
  </div>

  <div class="section-label"><p>Featured Collections</p></div>

  <div class="featured-grid" id="featuredGrid"></div>

  <div class="mid-divider">
    <div class="mid-line"></div>
    <span class="mid-text">Explore by Experience</span>
    <div class="mid-line"></div>
  </div>

  <div class="experience-grid" id="experienceGrid"></div>

  <div class="footer-nav">
    <div class="footer-line"></div>
    <a href="https://akpdigital.com" class="footer-btn">↩ Return to AKP Digital</a>
  </div>

  <script>
    const featured = [
      { title: 'A Letter from the Rainbow Bridge', tag: 'Pet Universe · Featured', image: 'file_0000000099b47208b4b10e4222ec5cc3.png', roomId: 'rainbowbridge', delay: '1.1s' },
      { title: 'Letters from the Quiet Heart',     tag: 'Pet Universe · New',      image: 'book-quiet.png',   roomId: 'quietheart',    delay: '1.2s' },
    ];

    const experiences = [
      { icon: '📖', title: 'Flipbooks',     sub: 'Page by page',    type: 'flipbook',  delay: '1.3s' },
      { icon: '🎧', title: 'Audiobooks',    sub: 'Listen & feel',   type: 'audio',     delay: '1.4s' },
      { icon: '📄', title: 'PDF Editions',  sub: 'Download & read', type: 'pdf',       delay: '1.5s' },
      { icon: '🎞', title: 'Cinematic',     sub: 'Visual stories',  type: 'cinematic', delay: '1.6s' },
      { icon: '🖼', title: 'Photo Art',     sub: 'Art editions',    type: 'photoart',  delay: '1.7s' },
      { icon: '📦', title: 'Bundles',       sub: 'Full experience', type: 'bundle',    delay: '1.8s' },
      { icon: '🌏', title: 'All Languages', sub: 'Global edition',  type: 'global',    delay: '1.9s' },
    ];

    document.getElementById('featuredGrid').innerHTML = featured.map(f => `
      <div class="featured-card" style="animation-delay:${f.delay}" onclick="goToRoom('${f.roomId}')">
        <img class="featured-img" src="${f.image}" alt="${f.title}" onerror="this.style.height='340px';this.style.background='linear-gradient(135deg,#c4956a,#8b6a4a)'"/>
        <div class="featured-overlay">
          <p class="featured-tag">${f.tag}</p>
          <h2 class="featured-title">${f.title}</h2>
          <span class="featured-btn">Enter Room →</span>
        </div>
      </div>
    `).join('');

    document.getElementById('experienceGrid').innerHTML = experiences.map(e => `
      <div class="exp-card" style="animation-delay:${e.delay}">
        <span class="exp-icon">${e.icon}</span>
        <p class="exp-title">${e.title}</p>
        <p class="exp-sub">${e.sub}</p>
      </div>
    `).join('');

    function goToRoom(id) { window.location.href = `room.html?id=${id}`; }
  </script>
</body>
</html>
